<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="assets/css/nav.css">
    <!-- Bootstrap CSS (necesario para que funcione) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>

<!-- HEADER / NAVBAR CON LOGO -->
<header>
    <nav class="navbar navbar-expand-lg navbar-mycar">
        <div class="container">
            <!-- Logo de la empresa -->
            <a class="navbar-brand" href="#">
                <img src="assets/imagenes/logo.jpg" alt="My Car Logo">
            </a>
            
            <!-- Botón hamburguesa para móvil -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMyCar" aria-controls="navbarMyCar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- Elementos del navbar -->
            <div class="collapse navbar-collapse" id="navbarMyCar">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            <i class="fas fa-search me-1"></i> Buscar autos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            <i class="fas fa-calendar-alt me-1"></i> Mis reservas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            <i class="fas fa-user me-1"></i> Mi cuenta
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            <i class="fas fa-history me-1"></i> Historial
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            <i class="fas fa-file-invoice me-1"></i> Facturación
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#promociones">
                            <i class="fas fa-gift me-1"></i> Promociones
                        </a>
                    </li>
                </ul>
                
                <!-- Botones de inicio de sesión y registro -->
                <div class="d-flex gap-2">
                    <a href="#" class="btn-login">
                        <i class="fas fa-sign-in-alt me-1"></i> Iniciar sesión
                    </a>
                    <a href="#" class="btn-register">
                        <i class="fas fa-user-plus me-1"></i> Registrarse
                    </a>
                </div>
            </div>
        </div>
    </nav>
</header>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
